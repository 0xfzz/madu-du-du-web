server.modules = (
    "mod_rewrite",
    "mod_accesslog",
    "mod_setenv",
    "mod_extforward"
)

# Trust reverse proxies (Caddy/Docker) to set X-Forwarded-For
extforward.forwarder = (
    "10.0.0.0/8" => "trust",
    "172.16.0.0/12" => "trust",
    "192.168.0.0/16" => "trust",
    "127.0.0.1" => "trust",
    "::1" => "trust"
)

server.document-root = "/app/static_html"
server.port = 8080
server.username = "www-data"
server.groupname = "www-data"

# Ensure logs go to the mounted volume
server.errorlog = "/app/logs/error.log"
accesslog.filename = "/app/logs/access.log"

# Standard Apache Combined Log Format
accesslog.format = "%h - - [%t] \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\""

# Spoof Headers to look like a vulnerable PHP/Apache stack
setenv.add-response-header = (
    "Server" => "Apache/2.4.41 (Ubuntu)",
    "X-Powered-By" => "PHP/7.4.3"
)

# Tell Lighttpd how to render files (so it doesn't download them as attachments)
mimetype.assign = (
  ".html" => "text/html",
  ".css"  => "text/css",
  ".js"   => "application/javascript",
  ".txt"  => "text/plain",
  ".jpg"  => "image/jpeg",
  ".png"  => "image/png"
)

index-file.names = ( "index.html" )

# -----------------------------------------------------------------------------
# HONEYPOT ROUTING & SIGNATURE DETECTION
# -----------------------------------------------------------------------------

# 1. SQL Injection Detection (GET Parameters)
$HTTP["querystring"] =~ "(?i)(union.*select|select.*from|insert.*into|drop.*table|update.*set|delete.*from|--|'|%27)" {
    url.rewrite-once = ( ".*" => "/sqli_error.html" )
}

# 2. Local File Inclusion (LFI) Detection - High Value Target (/etc/passwd)
else $HTTP["querystring"] =~ "(?i)(/etc/passwd|/etc/shadow|%2Fetc%2Fpasswd|%2Fetc%2Fshadow)" {
    url.rewrite-once = ( ".*" => "/lfi_passwd.html" )
}

# 3. Local File Inclusion (LFI) Detection - Generic Traversal
else $HTTP["querystring"] =~ "(?i)(\.\./|\.\.\\|%2E%2E%2F|%2E%2E%5C|/windows/win\.ini|/boot\.ini|file://|php://filter|php://input)" {
    url.rewrite-once = ( ".*" => "/lfi_generic.html" )
}

# 4. Command Injection Detection
else $HTTP["querystring"] =~ "(?i)(\|\||&&|;|%3B|%7C%7C|%26%26|`|%60|\$\(|%24%28|ping\s+-c|ping(\+|%20)-c|netcat|nc\s+-e|bash\s+-i|wget|curl)" {
    url.rewrite-once = ( ".*" => "/cmd_inject.html" )
}

# -----------------------------------------------------------------------------
# STANDARD PAGE ROUTING (Simulating PHP URLs)
# -----------------------------------------------------------------------------

else $HTTP["url"] =~ "^/admin" {
    url.rewrite-once = ( ".*" => "/admin.html" )
}
else $HTTP["url"] =~ "^/api/login" {
    url.rewrite-once = ( ".*" => "/admin.html" )
}
else $HTTP["querystring"] =~ "page=search\.php" {
    url.rewrite-once = ( ".*" => "/search.html" )
}
else $HTTP["querystring"] =~ "page=about\.php" {
    url.rewrite-once = ( ".*" => "/about.html" )
}
else $HTTP["querystring"] =~ "page=ping\.php" {
    url.rewrite-once = ( ".*" => "/ping.html" )
}
else $HTTP["url"] =~ "^/$" {
    url.rewrite-once = ( ".*" => "/index.html" )
}
