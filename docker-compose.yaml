services:
  honeypot:
    build: .
    image: faiznrd/pui-honeypot:latest
    container_name: pui-honeypot
    ports:
      - "8080:8080"
      - "2020:2020"
    volumes:
      - honeypot-logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped

volumes:
  honeypot-logs:
    driver: local
